# /etc/nginx/sites-available/blueprint-modular
# - Site vitrine (blueprint-modular.com) → /var/www/blueprint-modular
# - Documentation (docs.blueprint-modular.com) → /var/www/blueprint-modular-docs
# - App Next.js (app.blueprint-modular.com) → proxy vers PM2 (port 3000)
# Activer : ln -s /etc/nginx/sites-available/blueprint-modular /etc/nginx/sites-enabled/
# Puis : nginx -t && systemctl reload nginx
# Certificats app (1 cert pour les 4 noms) : sudo systemctl stop nginx ; sudo certbot certonly --standalone -d app.blueprint-modular.com -d app.blueprintmodular.com -d app.blueprint-modular.fr -d app.blueprintmodular.fr ; sudo systemctl start nginx

server {
    listen 80;
    server_name blueprint-modular.com www.blueprint-modular.com docs.blueprint-modular.com app.blueprint-modular.com app.blueprintmodular.com app.blueprint-modular.fr app.blueprintmodular.fr;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.blueprint-modular.com;
    ssl_certificate     /etc/letsencrypt/live/blueprint-modular.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/blueprint-modular.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;
    return 301 https://blueprint-modular.com$request_uri;
}

# Site vitrine uniquement (landing)
server {
    listen 443 ssl http2;
    server_name blueprint-modular.com;

    ssl_certificate     /etc/letsencrypt/live/blueprint-modular.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/blueprint-modular.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/blueprint-modular;
    index index.html;

    access_log /var/log/nginx/blueprint-modular.access.log;
    error_log  /var/log/nginx/blueprint-modular.error.log;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.html$ {
        add_header Content-Type "text/html; charset=utf-8";
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}

# Documentation (tout le contenu doc)
server {
    listen 443 ssl http2;
    server_name docs.blueprint-modular.com;

    ssl_certificate     /etc/letsencrypt/live/docs.blueprint-modular.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/docs.blueprint-modular.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/blueprint-modular-docs;
    index index.html;

    access_log /var/log/nginx/blueprint-modular-docs.access.log;
    error_log  /var/log/nginx/blueprint-modular-docs.error.log;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.html$ {
        add_header Content-Type "text/html; charset=utf-8";
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}

# App Next.js (Wiki, modules, sandbox) — 4 noms, 1 certificat
server {
    listen 443 ssl http2;
    server_name app.blueprint-modular.com app.blueprintmodular.com app.blueprint-modular.fr app.blueprintmodular.fr;

    ssl_certificate     /etc/letsencrypt/live/app.blueprint-modular.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.blueprint-modular.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Upload Monitor (PPTX) jusqu'à 50 Mo (sinon 413 par défaut 1 Mo)
    client_max_body_size 50m;

    access_log /var/log/nginx/blueprint-app.access.log;
    error_log  /var/log/nginx/blueprint-app.error.log;

    # Streaming IA : timeouts longs (réponse Qwen/Ollama peut prendre 1–2 min)
    location /api/ai/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 300s;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
