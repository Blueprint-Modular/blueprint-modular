# /etc/nginx/sites-available/blueprint-modular
# Site principal (landing) + sous-domaine docs (documentation)
# Activer : ln -s /etc/nginx/sites-available/blueprint-modular /etc/nginx/sites-enabled/
# Puis : nginx -t && systemctl reload nginx
# Pour docs.blueprintmodular.com : certbot certonly -d docs.blueprintmodular.com (ou wildcard *.blueprintmodular.com)

server {
    listen 80;
    server_name blueprint-modular.com www.blueprint-modular.com docs.blueprintmodular.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.blueprint-modular.com;
    ssl_certificate     /etc/letsencrypt/live/blueprint-modular.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/blueprint-modular.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;
    return 301 https://blueprint-modular.com$request_uri;
}

server {
    listen 443 ssl http2;
    server_name blueprint-modular.com;

    ssl_certificate     /etc/letsencrypt/live/blueprint-modular.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/blueprint-modular.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/blueprint-modular;
    index index.html;

    access_log /var/log/nginx/blueprint-modular.access.log;
    error_log  /var/log/nginx/blueprint-modular.error.log;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}

# Sous-domaine documentation (docs.blueprintmodular.com) — même root, index = docs.html
server {
    listen 443 ssl http2;
    server_name docs.blueprintmodular.com;

    ssl_certificate     /etc/letsencrypt/live/docs.blueprintmodular.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/docs.blueprintmodular.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/blueprint-modular;
    index docs.html;

    access_log /var/log/nginx/blueprint-modular-docs.access.log;
    error_log  /var/log/nginx/blueprint-modular-docs.error.log;

    location / {
        try_files $uri $uri/ /docs.html;
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
