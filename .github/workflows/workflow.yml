# Publication sur PyPI via Trusted Publishing (sans token).
# Prérequis : sur PyPI, section Publishing → Trusted publisher avec :
#   Owner: Blueprint-Modular (ou le propriétaire du dépôt GitHub),
#   Repository: blueprint-modular, Workflow: workflow.yml
# Déclenchement : push d'un tag v* (ex. git tag v0.1.0 && git push origin v0.1.0)

name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  pypi-publish:
    name: Upload to PyPI
    runs-on: ubuntu-latest
    needs: [build]
    # environment: pypi (optionnel sur GitHub ; PyPI accepte "Tous")
    permissions:
      id-token: write
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: .
