# Bootstrap : à utiliser AVANT d'avoir le certificat docs.blueprint-modular.com
# 1. Copier ce fichier : sudo cp .../nginx-bootstrap.conf /etc/nginx/sites-available/blueprint-modular
# 2. sudo nginx -t && sudo systemctl reload nginx
# 3. sudo certbot certonly -d docs.blueprint-modular.com --nginx
# 4. Remplacer par la config complète : sudo cp .../nginx.conf /etc/nginx/sites-available/blueprint-modular
# 5. sudo nginx -t && sudo systemctl reload nginx

# HTTP → HTTPS (sauf docs : pas encore de cert)
server {
    listen 80;
    server_name blueprint-modular.com www.blueprint-modular.com;
    return 301 https://$host$request_uri;
}

# docs.blueprint-modular.com en HTTP uniquement (pour Certbot)
server {
    listen 80;
    server_name docs.blueprint-modular.com;

    root /var/www/blueprint-modular-docs;
    index index.html;

    access_log /var/log/nginx/blueprint-modular-docs.access.log;
    error_log  /var/log/nginx/blueprint-modular-docs.error.log;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}

server {
    listen 443 ssl http2;
    server_name www.blueprint-modular.com;
    ssl_certificate     /etc/letsencrypt/live/blueprint-modular.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/blueprint-modular.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;
    return 301 https://blueprint-modular.com$request_uri;
}

# Site vitrine uniquement (landing)
server {
    listen 443 ssl http2;
    server_name blueprint-modular.com;

    ssl_certificate     /etc/letsencrypt/live/blueprint-modular.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/blueprint-modular.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/blueprint-modular;
    index index.html;

    access_log /var/log/nginx/blueprint-modular.access.log;
    error_log  /var/log/nginx/blueprint-modular.error.log;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}

